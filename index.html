<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --stone-deep:#0D1726;
  --stone:#152339;
  --stone-2:#1B2C46;
  --line:#27395559;
  --line-solid:#2A3C57;
  --gold:#C8A24A;
  --gold-soft:#E4CA86;
  --gold-dim:#9C7E36;
  --cream:#F3EEE2;
  --ink:#E8EEF6;
  --muted:#9DB0C8;
  --muted-2:#6F829C;
  --sky:#6FA8C7;
  --good:#5FB28A;
  --warn:#D8A24A;
  --shadow:0 18px 48px -20px rgba(0,0,0,.7);
  --radius:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:'Manrope',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, #1a2c46 0%, transparent 55%),
    radial-gradient(900px 500px at -10% 10%, #16273f 0%, transparent 50%),
    var(--stone-deep);
  color:var(--ink);
  font-size:16.5px;
  line-height:1.6;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;font-weight:600;line-height:1.18;margin:0}
a{color:var(--sky);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px;border-radius:6px}

/* ---------- Tapa motif divider ---------- */
.tapa{height:10px;background-image:
  repeating-linear-gradient(135deg, var(--gold) 0 2px, transparent 2px 9px),
  repeating-linear-gradient(45deg, var(--gold-dim) 0 2px, transparent 2px 9px);
  opacity:.5;background-size:13px 13px}

/* ---------- Header ---------- */
header{
  position:relative;
  padding:26px 20px 20px;
  border-bottom:1px solid var(--line-solid);
  background:linear-gradient(180deg, rgba(200,162,74,.06), transparent 70%);
}
.crest{display:flex;align-items:center;gap:13px;max-width:1080px;margin:0 auto}
.crest .glyph{flex:0 0 auto;width:46px;height:46px}
.crest .titles{flex:1;min-width:0}
.eyebrow{font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
.crest h1{font-size:clamp(20px,5vw,27px);color:var(--cream);margin-top:2px}
.crest .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.langtoggle{flex:0 0 auto;display:flex;border:1px solid var(--line-solid);border-radius:999px;overflow:hidden;background:#0c1622}
.langtoggle button{background:transparent;border:0;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px 13px;letter-spacing:.04em}
.langtoggle button[aria-pressed="true"]{background:var(--gold);color:#1a1206}

/* ---------- Tabs ---------- */
nav.tabs{position:sticky;top:0;z-index:30;background:rgba(11,20,32,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-solid)}
body.focus-promise nav.tabs{display:none}
body.focus-promise .yr{display:none}
body.focus-promise footer{display:none}
.tabs-inner{max-width:1080px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:transparent;border:0;color:var(--muted);padding:15px 14px 13px;font-weight:700;font-size:13.5px;letter-spacing:.01em;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab .n{font-family:'Playfair Display',serif;font-size:12px;color:var(--gold-dim);font-style:italic}
.tab[aria-selected="true"]{color:var(--cream);border-bottom-color:var(--gold)}
.tab[aria-selected="true"] .n{color:var(--gold)}

main{max-width:1080px;margin:0 auto;padding:24px 18px 80px}
.panel{display:none;animation:fade .35s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-head{margin:0 0 18px}
.section-head .eyebrow{margin-bottom:6px}
.section-head h2{font-size:clamp(22px,5.4vw,32px);color:var(--cream)}
.section-head p{color:var(--muted);font-size:15.5px;margin:8px 0 0;max-width:60ch}

.card{background:linear-gradient(180deg,var(--stone),var(--stone-deep));border:1px solid var(--line-solid);border-radius:var(--radius);box-shadow:var(--shadow)}
.bi-en{display:block;color:var(--muted);font-weight:500;font-size:.88em;margin-top:2px}
.bi-en.serif{font-family:'Manrope',sans-serif}
.lang-en .bi-pri{} /* primary swaps handled in JS via .bi blocks */

/* ---------- Tab 1: Theme & Goals ---------- */
.hero{position:relative;overflow:hidden;padding:34px 26px;border-radius:var(--radius);border:1px solid var(--line-solid);
  background:
    radial-gradient(700px 360px at 85% -30%, rgba(228,202,134,.16), transparent 60%),
    linear-gradient(160deg,#1c3252,#0e1a2b 75%);
  box-shadow:var(--shadow)}
.hero .area{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.hero h2{font-size:clamp(23px,6vw,40px);color:#fff;margin:10px 0 0;max-width:18ch;line-height:1.12}
.hero .theme-en{color:var(--gold-soft);font-size:clamp(15px,3.6vw,20px);font-family:'Playfair Display',serif;font-style:italic;margin-top:10px;max-width:30ch}
.hero .ref{display:inline-block;margin-top:18px;font-weight:700;font-size:12.5px;letter-spacing:.08em;color:var(--gold);border:1px solid var(--gold-dim);padding:6px 12px;border-radius:999px}
.scripture{margin-top:16px;color:var(--ink);font-size:17.5px;border-left:2px solid var(--gold-dim);padding-left:16px;max-width:62ch}
.scripture em{display:block;color:var(--muted);font-style:normal;font-size:15px;margin-top:6px}

.vision{margin-top:18px;display:flex;gap:14px;align-items:flex-start;padding:20px 22px;border-radius:var(--radius);border:1px solid var(--line-solid);background:linear-gradient(120deg,#16344a,#102031)}
.vision .mark{flex:0 0 auto;width:34px;height:34px;color:var(--sky)}
.vision .v-to{font-family:'Playfair Display',serif;font-size:22px;color:#fff}
.vision .v-en{color:var(--sky);font-size:15px;margin-top:3px}

.goal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;margin-top:18px}
.goal{padding:18px 18px 6px;border-radius:14px}
.goal h3{font-size:19.5px;color:var(--cream);display:flex;align-items:baseline;gap:8px}
.goal h3 .en{font-size:12px;color:var(--gold);font-family:'Manrope';font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.goal ul{list-style:none;margin:12px 0 0;padding:0}
.goal li{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:15px;color:var(--muted)}
.goal li:first-child{border-top:0}
.goal li .lbl{flex:1}
.goal li .lbl .en{display:block;color:var(--muted-2);font-size:12.5px}
.goal li .tgt{flex:0 0 auto;font-weight:800;color:var(--gold-soft);font-variant-numeric:tabular-nums}

.quotes{margin-top:24px;display:grid;gap:14px}
.quote{padding:22px 24px;border-radius:14px;border:1px solid var(--line-solid);background:linear-gradient(160deg,#15273e,#0f1c2d)}
.quote p{font-family:'Playfair Display',serif;font-size:19.5px;color:var(--ink);margin:0;font-style:italic}
.quote .en{font-style:normal;font-family:'Manrope';font-size:15px;color:var(--muted);margin-top:8px}
.quote .by{display:block;margin-top:12px;font-size:12px;letter-spacing:.04em;color:var(--gold);font-weight:700;font-style:normal;font-family:'Manrope'}

/* image slots — purposeful sizes: profile (round), wide (banner), big (full image visible) */
.imgslot{border:1.6px dashed var(--line-solid);border-radius:14px;background:#0c1726;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted-2);text-align:center;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,background .2s}
.imgslot:hover{border-color:var(--gold-dim);background:#0e1c2c}
.imgslot .ico{width:30px;height:30px;opacity:.55}
.imgslot .cap{font-size:13px;font-weight:700;letter-spacing:.02em;line-height:1.3;max-width:30ch}
.imgslot .rm{position:absolute;top:8px;right:8px;z-index:2;background:rgba(8,14,22,.82);border:1px solid var(--line-solid);color:var(--cream);border-radius:9px;font-size:12px;font-weight:700;padding:5px 11px;display:none}
.imgslot.has .rm{display:block}
.imgslot input[type=file]{display:none}
/* profile — circular headshot */
.imgslot.profile{width:128px;height:128px;min-width:128px;border-radius:50%;padding:10px;flex:0 0 auto}
.imgslot.profile .ico{width:24px;height:24px}
.imgslot.profile .cap{font-size:11px}
.imgslot.profile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* wide — compact when empty, banner once a photo is added */
.imgslot.wide{width:100%;min-height:128px}
.imgslot.wide.has{aspect-ratio:16/7;min-height:0;padding:0}
.imgslot.wide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* big — shows the WHOLE image, nothing cropped */
.imgslot.big{width:100%;min-height:188px;background:#0a131f}
.imgslot.big.has{padding:0}
.imgslot.big img{max-width:100%;max-height:560px;width:auto;height:auto;object-fit:contain;border-radius:8px}
/* fill — fills a parent container (lesson photo) */
.imgslot.fill{margin:0;border:0;border-radius:0;height:100%;min-height:120px}
.imgslot.fill img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* prophet / theme quote row with profile */
.prophet{display:flex;gap:20px;align-items:center;margin-top:20px;padding:22px 24px;border-radius:var(--radius);border:1px solid var(--line-solid);background:linear-gradient(120deg,#16283f,#101e30)}
.prophet .pq{flex:1;min-width:0}
.prophet blockquote{margin:0;font-family:'Playfair Display',serif;font-size:19px;font-style:italic;color:var(--ink);line-height:1.45}
.prophet blockquote .en{display:block;font-family:'Manrope';font-style:normal;font-size:15px;color:var(--muted);margin-top:9px}
.prophet .by{display:block;margin-top:14px;font-size:13px;letter-spacing:.03em;color:var(--gold);font-weight:700}
.prophet .by small{display:block;color:var(--muted-2);font-weight:600;font-size:12px;letter-spacing:0;margin-top:2px}

/* pillar devotional sections */
.pillars{display:grid;gap:16px;margin-top:18px}
.pillar{border:1px solid var(--line-solid);border-radius:var(--radius);overflow:hidden;background:linear-gradient(160deg,#15273e,#0f1c2d)}
.pillar .ptext{padding:22px 24px}
.pillar .ptag{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.pillar .phead{font-family:'Playfair Display',serif;font-size:20px;color:#fff;margin:8px 0 0;line-height:1.3}
.pillar .phead .en{display:block;font-family:'Manrope';font-size:15px;font-weight:600;color:var(--gold-soft);font-style:normal;margin-top:7px}
.pillar .pbody{font-size:15px;color:var(--ink);margin:12px 0 0;line-height:1.6}
.pillar .pbody .en{display:block;color:var(--muted);font-size:13.5px;margin-top:7px}
.pillar.with-profile .ptext{display:flex;gap:20px;align-items:center}
.pillar.with-profile .pinner{flex:1;min-width:0}

/* come-follow-me note */
.cfm{display:flex;gap:14px;align-items:center;margin-top:24px;padding:18px 22px;border-radius:14px;border:1px solid var(--line-solid);background:#11243a}
.cfm .ico{flex:0 0 auto;width:30px;height:30px;color:var(--gold)}
.cfm .ct b{display:block;color:var(--cream);font-size:15.5px}
.cfm .ct span{display:block;color:var(--muted);font-size:13.5px;margin-top:2px}
@media (max-width:600px){
  .prophet{flex-direction:column;text-align:center}
  .pillar.with-profile .ptext{flex-direction:column;text-align:center}
}

/* ---------- Tab 2: Lessons ---------- */
.notebar{display:flex;gap:12px;align-items:flex-start;padding:15px 18px;border-radius:13px;border:1px solid var(--line-solid);background:#11243a;margin-bottom:8px;font-size:14.5px;color:var(--muted)}
.notebar .badge{flex:0 0 auto;font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--gold);text-transform:uppercase}
.lessons{margin-top:18px;display:grid;gap:13px}
.lesson{display:grid;grid-template-columns:120px 1fr;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--line-solid);background:linear-gradient(120deg,#15263c,#101d2e)}
.lesson .photo{position:relative;background:#0c1726;border-right:1px solid var(--line-solid);min-height:100%;display:flex;align-items:center;justify-content:center}
.lesson .body{padding:16px 18px}
.lesson .date{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.05em;color:#1a1206;background:var(--gold);padding:4px 10px;border-radius:999px}
.lesson .date.q3{background:var(--sky);color:#06202c}
.lesson h3{font-size:20.5px;margin:11px 0 0;color:var(--cream)}
.lesson .topic-en{font-size:14.5px;color:var(--gold);font-weight:700;margin-top:2px}
.lesson .summary{font-size:15.5px;color:var(--ink);margin:10px 0 0;font-family:'Playfair Display',serif;font-style:italic}
.lesson .summary .en{display:block;font-family:'Manrope';font-style:normal;color:var(--muted);font-size:13.5px;margin-top:6px}
.lesson .who{margin-top:11px;font-size:13px;color:var(--muted-2)}
.lesson .who b{color:var(--ink);font-weight:700}
.teacher-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);font-size:14px;color:var(--ink)}
.teacher-row svg{width:17px;height:17px;color:var(--gold);flex:0 0 auto}
.teacher-row .tl{color:var(--muted-2);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
.teacher-row .tv{font-weight:700;color:var(--cream)}
.teacher-row .tv.empty{color:var(--muted-2);font-weight:500}

/* lesson edit form */
.ledit{display:grid;gap:11px}
.ledit .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ledit .one{display:grid;gap:5px}
.ledit label{font-size:10.5px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-dim)}
.ledit input,.ledit textarea{width:100%;background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;resize:vertical}
.ledit textarea{min-height:60px}
.ledit input:focus,.ledit textarea:focus{border-color:var(--gold-dim);background:#0b1521}
.ledit .teach{background:#11243a;border:1px solid var(--line-solid);border-radius:10px;padding:11px 13px}
.ledit .del{justify-self:start;margin-top:2px;border:1px solid #5a2f2f;background:#2a1414;color:#e7a3a3;font-weight:700;font-size:12.5px;padding:8px 14px;border-radius:10px;display:inline-flex;align-items:center;gap:7px}
.ledit .del:hover{background:#3a1a1a}
.ledit .del svg{width:14px;height:14px}
.add-lesson{width:100%;margin-top:14px;border:1.5px dashed var(--line-solid);background:#0f1d2e;color:var(--gold-soft);font-weight:700;font-size:14px;padding:15px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:9px}
.add-lesson:hover{border-color:var(--gold-dim)}
.add-lesson svg{width:18px;height:18px}
.notebar input,.notebar textarea{width:100%;background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:13.5px;margin-top:6px;resize:vertical}

/* handbook guidance card */
.guide{display:flex;gap:14px;align-items:flex-start;margin:14px 0 8px;padding:18px 20px;border-radius:13px;border:1px solid var(--line-solid);background:linear-gradient(120deg,#16273e,#101d2e)}
.guide .gref{flex:0 0 auto;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1a1206;background:var(--gold);border-radius:9px;padding:5px 10px;letter-spacing:.02em}
.guide .gtitle{font-family:'Playfair Display',serif;font-size:17px;color:var(--cream)}
.guide .gtitle .en{display:block;font-family:'Manrope';font-size:13px;color:var(--gold);font-weight:700;margin-top:1px}
.guide .gbody{font-size:14px;color:var(--ink);margin-top:9px;line-height:1.55}
.guide .gbody .en{display:block;color:var(--muted);font-size:13px;margin-top:7px}
@media (max-width:560px){.ledit .row{grid-template-columns:1fr}.guide{flex-direction:column}}

/* ---------- Tab 3: Tracker ---------- */
.editbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.btn{border:1px solid var(--line-solid);background:#13243a;color:var(--ink);font-weight:700;font-size:13px;padding:10px 15px;border-radius:11px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--gold-dim)}
.btn.primary{background:var(--gold);color:#1a1206;border-color:var(--gold)}
.btn.primary:hover{background:var(--gold-soft)}
.btn.ghost{background:transparent}
.btn svg{width:16px;height:16px}
.editstate{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted-2)}
.dot.on{background:var(--good);box-shadow:0 0 0 3px rgba(95,178,138,.18)}

.group{margin-top:20px}
.group > .ghead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:0 2px 12px}
.group .gtag{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--gold);text-transform:uppercase}
.group h3{font-size:19px;color:var(--cream)}
.group h3 .en{font-size:13px;color:var(--muted);font-family:'Manrope';font-weight:600}

.member{border:1px solid var(--line-solid);border-radius:13px;background:linear-gradient(160deg,#15263c,#101c2d);margin-bottom:11px;overflow:hidden}
.member .mhead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.member .mname{flex:1;min-width:0}
.member .mname .nm{font-weight:700;font-size:17px;color:var(--cream)}
.member .mname .status{font-size:12.5px;color:var(--gold);font-weight:700;margin-top:1px}
.member .prog{flex:0 0 auto;display:flex;align-items:center;gap:9px}
.member .prog .ring{font-size:11.5px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
.bar{flex:0 0 64px;height:6px;border-radius:999px;background:#0c1726;overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-soft));width:0;transition:width .4s}
.chev{flex:0 0 auto;width:18px;height:18px;color:var(--muted-2);transition:transform .25s}
.member.open .chev{transform:rotate(90deg)}
.member .mbody{display:none;padding:4px 16px 18px;border-top:1px solid var(--line)}
.member.open .mbody{display:block}

.field{margin-top:14px}
.field > label{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px}
.indicators{display:grid;gap:7px}
.ind{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:10px;background:#0e1a2a;border:1px solid var(--line)}
.ind input{flex:0 0 auto;width:19px;height:19px;margin:1px 0 0;accent-color:var(--gold)}
.ind .key{flex:0 0 auto;font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);width:16px;text-align:center}
.ind .txt{flex:1;font-size:14.5px;color:var(--ink)}
.ind .txt .en{display:block;color:var(--muted-2);font-size:12.5px}

/* ---------------- storage layer (Firestore for shared keys, else localStorage) ---------------- */
const Store=(()=>{
  let fs=null, ready=false;
  async function init(){
    if(FIREBASE_ENABLED){
      try{
        await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js");
        await loadScript("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js");
        firebase.initializeApp(firebaseConfig); fs=firebase.firestore(); ready=true;
        return 'cloud';
      }catch(e){console.warn('Firebase unavailable — using on-device storage.',e);}
    }
    ready=true; return 'local';
  }
  function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  function saveLocal(key,val){try{localStorage.setItem('wj8_'+key,JSON.stringify(val));}catch(e){console.warn('Local save failed (storage full?)',e);}}
  async function get(key){
    if(fs && SYNC_KEYS.has(key)){
      try{const doc=await fs.collection('wj8').doc(key).get();if(doc.exists)return doc.data().v;}catch(e){console.warn('Cloud read failed',e);}
    }
    const v=localStorage.getItem('wj8_'+key);return v?JSON.parse(v):null;
  }
  function set(key,val){
    saveLocal(key,val);
    if(fs && SYNC_KEYS.has(key)){fs.collection('wj8').doc(key).set({v:val}).catch(e=>console.warn('Cloud write failed',e));}
  }
  return {init,get,set,get mode(){return fs?'cloud':'local';}};
})();

function bindLessons(){
  $$('#panel-lessons [data-field]').forEach(inp=>inp.addEventListener('input',e=>{
    ensureLessons();const i=+e.target.dataset.li;state.lessons[i][e.target.dataset.field]=e.target.value;saveLessonsDebounced();
  }));
  $$('#panel-lessons [data-note]').forEach(inp=>inp.addEventListener('input',e=>{
    state.lessonNote=state.lessonNote||Object.assign({},LESSON_NOTE);state.lessonNote[e.target.dataset.note]=e.target.value;saveLessonsDebounced();
  }));
  $$('#panel-lessons [data-del-li]').forEach(b=>b.addEventListener('click',e=>{
    const i=+e.currentTarget.dataset.delLi;
    if(!confirm(t('Tāmateʻi ʻa e lesoni ko ʻení?','Delete this lesson?')))return;
    ensureLessons();state.lessons.splice(i,1);saveLessons();renderLessons();
  }));
}
function addLesson(){
  ensureLessons();
  state.lessons.push({date_to:'',date_en:'',who:'',role_to:'',role_en:'',topic_to:'',topic_en:'',ref:'',sum_to:'',sum_en:'',teacher:''});
  const idx=state.lessons.length-1;
  saveLessons();renderLessons();
  const el=$(`#panel-lessons input[data-li="${idx}"][data-field="date_to"]`);
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.focus(),350);}
  toast(t('Kuo tānaki ha lesoni foʻou','New lesson added'));
}

function saveLessonsDebounced(){clearTimeout(_svl);_svl=setTimeout(saveLessons,500);}
function saveLessons(){if(state.lessons)Store.set('lessons',state.lessons);if(state.lessonNote)Store.set('lessonNote',state.lessonNote);}


let openMembers=new Set();
function memData(id){return state.tracker[id]||{};}
function mState(id){return state.tracker[id]=state.tracker[id]||{};}
function effGroup(m){return memData(m.id).group||m.defaultGroup;}
function indsDone(id){const d=memData(id);return d.ind?Object.values(d.ind).filter(Boolean).length:0;}
function memStatus(m){const d=memData(m.id);return d.status!==undefined?d.status:m.status;}
function lastActivity(m){let f=null;MONTHS.forEach(mo=>{const d=memData(m.id);const v=(d[mo[0]]!==undefined)?d[mo[0]]:(m[mo[0]]||'');if(v&&String(v).trim())f=mo;});return f;}

    return `<label class="ind${on?' done':''}"><input type="checkbox" data-mid="${m.id}" data-ind="${ind.k}" ${on?'checked':''} ${editMode?'':'disabled'}><span class="key">${ind.k}</span><span class="txt">${esc(t(ind.to,ind.en))}<span class="en">${esc(t(ind.en,ind.to))}</span></span></label>`;

        ? `<span class="cov-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>${t('Kakato','Done')}</span>`

function renderTracker(){
  const buckets={miss:[],strg:[],pe:[],covenant:[]};
  ALL_MEMBERS.forEach(m=>{const g=effGroup(m);(buckets[g]||buckets[m.defaultGroup]).push(m);});
  const active=ALL_MEMBERS.filter(m=>effGroup(m)!=='covenant');
  const totalDone=active.reduce((s,m)=>s+indsDone(m.id),0), totalPoss=active.length*9;
  const overallPct=totalPoss?Math.round(totalDone/totalPoss*100):0;
  const needs=active.filter(m=>indsDone(m.id)<3 && !lastActivity(m));
  const ready=active.filter(m=>{const d=memData(m.id);return !(d.ind&&d.ind.i)&&indsDone(m.id)>=6;});

  const SHORT={miss:['Fakafaifekau','Missionary'],strg:['Fakamālohia','Strengthening'],pe:['Teuteu Kaumatuʻa','Prospective'],covenant:['Hala Fuakava','Covenant Path']};
  const tiles=GROUP_ORDER.map(gid=>`<div class="tile${GROUP_META[gid].completed?' completed':''}"><div class="num">${buckets[gid].length}</div><div class="lbl">${esc(t(SHORT[gid][0],SHORT[gid][1]))}</div></div>`).join('');
  const chip=(m,cls)=>`<button class="chip ${cls}" onclick="focusMember('${m.id}')">${esc(m.name)}<span class="cnt">${indsDone(m.id)}/9</span></button>`;
  const needsChips=needs.length?needs.map(m=>chip(m,'warn')).join(''):`<span class="none">${t('ʻOku ʻi ai ha fakalakalaka ʻa e mēmipa kotoa.','Every member has active progress.')}</span>`;
  const readyChips=ready.length?ready.map(m=>chip(m,'ready')).join(''):`<span class="none">${t('ʻOku teʻeki ofi ha taha ki he hiki.','No one is close to advancing yet.')}</span>`;

  const dash=`<div class="dash">
    <div class="dhead"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg>
      <div><h3>${t('Ngaahi Fakaʻilonga Tefito','Key Indicators')}</h3></div></div>
    <div class="tiles">${tiles}</div>

function toggleMember(id){
  const el=document.querySelector('.member[data-mid="'+id+'"]');
  if(openMembers.has(id)){openMembers.delete(id);el&&el.classList.remove('open');}
  else{openMembers.add(id);el&&el.classList.add('open');}
}
function focusMember(id){
  openMembers.add(id);renderTracker();
  const el=document.querySelector('.member[data-mid="'+id+'"]');
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}
function setIndicator(id,k,val){
  const m=ALL_MEMBERS.find(x=>x.id===id),d=mState(id);d.ind=d.ind||{};d.ind[k]=val;
  if(k==='i'&&val){
    const cur=d.group||m.defaultGroup;
    if(cur==='miss'){d.group='strg';d.ind={};openMembers.delete(id);toast(t(m.name+' → Fakamālohia',m.name+' → Strengthening'));}
    else if(cur==='strg'||cur==='pe'){d.group='covenant';toast(t('Mālō! Kuo kakato e hala ʻo e fuakavá 🎉','Covenant path completed 🎉'));}
  }
  saveTracker();renderTracker();
}
function moveMember(id,to){
  const m=ALL_MEMBERS.find(x=>x.id===id),d=mState(id),from=d.group||m.defaultGroup;
  if(from===to)return;
  if((from==='miss')!==(to==='miss'))d.ind={};
  d.group=to;saveTracker();renderTracker();
}

  $('#panel-promise').innerHTML=`
    <div class="section-head"><div class="eyebrow">${t('Ngāue Fakafaifekau','Member Missionary Work')}</div><h2>${t('Palōmesi ʻAho ʻe 21','The 21-Day Promise')}</h2></div>
    <div class="promise-intro">

}

/* =====================================================================

   ===================================================================== */
let state={tracker:{},codes:{},p21:{},lessons:null,lessonNote:null};
let editMode=false;

function bindTracker(){
  $$('#panel-tracker .ind input').forEach(c=>c.addEventListener('change',e=>{
    if(!editMode){e.target.checked=!e.target.checked;return;}
    setIndicator(e.target.dataset.mid,e.target.dataset.ind,e.target.checked);
  }));
  $$('#panel-tracker textarea[data-mon]').forEach(ta=>ta.addEventListener('input',e=>{
    const id=e.target.dataset.mid,mo=e.target.dataset.mon;
    mState(id)[mo]=e.target.value;saveTrackerDebounced();
  }));
  $$('#panel-tracker .statusinput').forEach(inp=>inp.addEventListener('input',e=>{
    mState(e.target.dataset.mid).status=e.target.value;saveTrackerDebounced();
  }));
  $$('#panel-tracker .code input').forEach(inp=>inp.addEventListener('input',e=>{
    state.codes[e.target.dataset.code]=e.target.value;saveTrackerDebounced();
  }));
  $$('#panel-tracker select[data-move]').forEach(s=>s.addEventListener('change',e=>{
    moveMember(e.target.dataset.move,e.target.value);
  }));
}
let _sv;
function saveTrackerDebounced(){clearTimeout(_sv);_sv=setTimeout(saveTracker,500);}
function saveTracker(){Store.set('tracker',state.tracker);Store.set('codes',state.codes);}

function toggleEdit(){
  if(!editMode){
    const code=prompt(t('Fakahū ʻa e fika faka-takimuʻá:','Enter leader passcode:'));
    if(code===null)return;
    if(code!==LEADER_PASSCODE){toast(t('Fika hala','Wrong passcode'));return;}
    editMode=true;toast(t('Ava ki he fakatonutonú','Editing unlocked'));
  }else{editMode=false;toast(t('Kuo tāpuni','Editing locked'));}
  renderTracker();renderLessons();
}

function bindPromise(){
  $$('#panel-promise input[data-day21]').forEach(c=>c.addEventListener('change',e=>{
    const n=e.target.dataset.day21,f=e.target.dataset.f;
    state.p21['d'+n]=state.p21['d'+n]||{};state.p21['d'+n][f]=e.target.checked;
    saveP21();updateP21Progress(n);
  }));
  $$('#panel-promise input[data-p21]').forEach(inp=>inp.addEventListener('input',e=>{state.p21[e.target.dataset.p21]=e.target.value;saveP21Debounced();}));
  $$('#panel-promise input[data-p21c]').forEach(c=>c.addEventListener('change',e=>{state.p21['c'+e.target.dataset.p21c]=e.target.checked;saveP21();}));
}
function updateP21Progress(n){
  // update the single row's full-state + the top counter without full re-render (keeps focus/scroll)
  const total=SCRIPTURES.length;let complete=0;
  for(let i=1;i<=total;i++){const d=state.p21['d'+i]||{};if(d.am&&d.pm&&d.read)complete++;}
  const row=$(`#panel-promise .dayrow[data-day="${n}"]`);
  if(row){const d=state.p21['d'+n]||{};row.classList.toggle('full',!!(d.am&&d.pm&&d.read));}
  const cnt=$('#p21-count');if(cnt)cnt.innerHTML=`${complete}<span style="font-size:16px;color:var(--muted)">/${total}</span>`;
  const bar=$('#p21-bar');if(bar)bar.style.width=Math.round(complete/total*100)+'%';
  if(complete===total)toast(t('Mālō! Kuo kakato ʻa e ʻaho ʻe 21 🌅','You did it! 21 days complete 🌅'));
}
let _svp;
function saveP21Debounced(){clearTimeout(_svp);_svp=setTimeout(saveP21,500);}
function saveP21(){Store.set('p21',state.p21);}
function reset21(){if(confirm(t('Kamata foʻou ʻa e palōmesí? ʻE mole ʻa e fakaʻiló.','Start the promise over? Your progress will be cleared.'))){state.p21={};saveP21();renderPromise();}}
function share21(){
  const url=location.href.split('#')[0].split('?')[0]+'#promise';
  const title=t('WJ8 · Palōmesi ʻAho ʻe 21','WJ8 · 21-Day Promise');
  if(navigator.share){navigator.share({title,text:t('Ko e palōmesi ʻaho ʻe 21 — ʻahiʻahiʻi ia.','Try the 21-Day Promise.'),url}).catch(()=>{});}
  else{navigator.clipboard.writeText(url).then(()=>toast(t('Kuo kopi ʻa e link ʻo e palōmesí','Promise form link copied'))).catch(()=>toast(url));}
}

/* ---- image slots (saved as data URLs; work fully offline) ---- */
function imgslot(id,kind,capTo,capEn){
  const saved=state.img&&state.img[id];
  const cap = (capTo||capEn) ? esc(t(capTo,capEn)) : t('Fakahūʻi fakatātā','Add photo');
  return `<label class="imgslot ${kind||'wide'}${saved?' has':''}" data-img="${id}">
    ${saved?`<img src="${saved}" alt="">`:`<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span class="cap">${cap}</span>`}
    <span class="rm" onclick="removeImg(event,'${id}')">${t('Toʻo','Remove')}</span>
    <input type="file" accept="image/*"></label>`;
}
function downscaleImage(file, maxDim, cb){
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxDim||h>maxDim){const s=Math.min(maxDim/w,maxDim/h);w=Math.round(w*s);h=Math.round(h*s);}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{cb(c.toDataURL('image/jpeg',0.82));}catch(_){cb(r.result);}
    };
    img.onerror=()=>cb(r.result);
    img.src=r.result;
  };
  r.readAsDataURL(file);
}
function bindImgSlots(){
  $$('.imgslot input[type=file]').forEach(inp=>inp.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const id=e.target.closest('.imgslot').dataset.img;
    const isProfile=e.target.closest('.imgslot').classList.contains('profile');
    downscaleImage(f, isProfile?480:1280, dataUrl=>{
      state.img=state.img||{};state.img[id]=dataUrl;Store.set('img',state.img);
      const tab=$('.tab[aria-selected="true"]').dataset.tab;tab==='theme'?renderTheme():renderLessons();
    });
  }));
}
function removeImg(ev,id){ev.preventDefault();ev.stopPropagation();if(state.img)delete state.img[id];Store.set('img',state.img||{});
  const tab=$('.tab[aria-selected="true"]').dataset.tab;tab==='theme'?renderTheme():renderLessons();}

function setLang(l){
  LANG=l;localStorage.setItem('wj8_lang',l);
  document.documentElement.lang=l==='to'?'to':'en';
  document.body.classList.remove('lang-to','lang-en');
  document.body.classList.add('lang-'+l);
  $('#lang-to').setAttribute('aria-pressed',l==='to');
  $('#lang-en').setAttribute('aria-pressed',l==='en');
  $$('[data-to]').forEach(el=>{el.textContent=l==='to'?el.dataset.to:el.dataset.en;});
  renderAll();
  syncFocusHeader();
}
function renderAll(){renderTheme();renderLessons();renderTracker();renderPromise();}

$$('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  $$('.tab').forEach(t=>t.setAttribute('aria-selected','false'));
  tab.setAttribute('aria-selected','true');
  $$('.panel').forEach(p=>p.classList.remove('active'));
  $('#panel-'+tab.dataset.tab).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}));

(async function boot(){
  const mode=await Store.init();
  state.tracker=await Store.get('tracker')||{};

  state.p21=await Store.get('p21')||{};

  $('#storage-note').textContent = (Store.mode==='cloud')
    ? (LANG==='to'?'Tracker, lesoni, mo e kī ʻoku fakahokohoko ʻi he ʻao (Firebase). Ko e palōmesi ʻaho ʻe 21 mo e ngaahi fakatātaá ʻoku tauhi ʻi he tēvaisí ni.':'Tracker, lessons, and code key sync to the cloud (Firebase). The 21-Day Promise and photos are saved on this device.')
    : (LANG==='to'?'ʻOku tauhi ʻa e ngaahi fakaʻiló ʻi he tēvaisí ni.':'Saving on this device. (Cloud sync will connect when online.)');
  setLang(LANG);
})();
