<!DOCTYPE html>
<html lang="to">
<head>
<meta charset="UTF-8" />

<title>WJ8 Kōlomu Kaumatuʻa 2026</title>
<meta name="theme-color" content="#0D1726" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WJ8 EQ 2026" />
<!-- Inline favicon: covenant stone glyph -->

<!-- PWA manifest (inline). For full offline on GitHub Pages, add a companion sw.js + icon-192/512.png. -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22WJ8%20Kolomu%20Kaumatua%202026%22%2C%22short_name%22%3A%22WJ8%20EQ%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230D1726%22%2C%22theme_color%22%3A%22%230D1726%22%7D" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --stone-deep:#0D1726;
  --stone:#152339;
  --stone-2:#1B2C46;
  --line:#27395559;
  --line-solid:#2A3C57;
  --gold:#C8A24A;
  --gold-soft:#E4CA86;
  --gold-dim:#9C7E36;
  --cream:#F3EEE2;
  --ink:#E8EEF6;
  --muted:#9DB0C8;
  --muted-2:#6F829C;
  --sky:#6FA8C7;
  --good:#5FB28A;
  --warn:#D8A24A;
  --shadow:0 18px 48px -20px rgba(0,0,0,.7);
  --radius:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:'Manrope',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, #1a2c46 0%, transparent 55%),
    radial-gradient(900px 500px at -10% 10%, #16273f 0%, transparent 50%),
    var(--stone-deep);
  color:var(--ink);
  line-height:1.55;
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif;font-weight:600;line-height:1.18;margin:0}
a{color:var(--sky);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--gold-soft);outline-offset:2px;border-radius:6px}

/* ---------- Tapa motif divider ---------- */
.tapa{height:10px;background-image:
  repeating-linear-gradient(135deg, var(--gold) 0 2px, transparent 2px 9px),
  repeating-linear-gradient(45deg, var(--gold-dim) 0 2px, transparent 2px 9px);
  opacity:.5;background-size:13px 13px}

/* ---------- Header ---------- */
header{
  position:relative;
  padding:26px 20px 20px;
  border-bottom:1px solid var(--line-solid);
  background:linear-gradient(180deg, rgba(200,162,74,.06), transparent 70%);
}
.crest{display:flex;align-items:center;gap:13px;max-width:1080px;margin:0 auto}
.crest .glyph{flex:0 0 auto;width:46px;height:46px}
.crest .titles{flex:1;min-width:0}
.eyebrow{font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
.crest h1{font-size:clamp(20px,5vw,27px);color:var(--cream);margin-top:2px}
.crest .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.langtoggle{flex:0 0 auto;display:flex;border:1px solid var(--line-solid);border-radius:999px;overflow:hidden;background:#0c1622}
.langtoggle button{background:transparent;border:0;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px 13px;letter-spacing:.04em}
.langtoggle button[aria-pressed="true"]{background:var(--gold);color:#1a1206}

/* ---------- Tabs ---------- */
nav.tabs{position:sticky;top:0;z-index:30;background:rgba(11,20,32,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-solid)}
.tabs-inner{max-width:1080px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:transparent;border:0;color:var(--muted);padding:15px 14px 13px;font-weight:700;font-size:13.5px;letter-spacing:.01em;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab .n{font-family:'Playfair Display',serif;font-size:12px;color:var(--gold-dim);font-style:italic}
.tab[aria-selected="true"]{color:var(--cream);border-bottom-color:var(--gold)}
.tab[aria-selected="true"] .n{color:var(--gold)}

main{max-width:1080px;margin:0 auto;padding:24px 18px 80px}
.panel{display:none;animation:fade .35s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-head{margin:0 0 18px}
.section-head .eyebrow{margin-bottom:6px}
.section-head h2{font-size:clamp(22px,5.4vw,32px);color:var(--cream)}
.section-head p{color:var(--muted);font-size:14px;margin:8px 0 0;max-width:60ch}

.card{background:linear-gradient(180deg,var(--stone),var(--stone-deep));border:1px solid var(--line-solid);border-radius:var(--radius);box-shadow:var(--shadow)}
.bi-en{display:block;color:var(--muted);font-weight:500;font-size:.82em;margin-top:2px}
.bi-en.serif{font-family:'Manrope',sans-serif}
.lang-en .bi-pri{} /* primary swaps handled in JS via .bi blocks */

/* ---------- Tab 1: Theme & Goals ---------- */
.hero{position:relative;overflow:hidden;padding:34px 26px;border-radius:var(--radius);border:1px solid var(--line-solid);
  background:
    radial-gradient(700px 360px at 85% -30%, rgba(228,202,134,.16), transparent 60%),
    linear-gradient(160deg,#1c3252,#0e1a2b 75%);
  box-shadow:var(--shadow)}
.hero .area{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.hero h2{font-size:clamp(23px,6vw,40px);color:#fff;margin:10px 0 0;max-width:18ch;line-height:1.12}
.hero .theme-en{color:var(--gold-soft);font-size:clamp(15px,3.6vw,20px);font-family:'Playfair Display',serif;font-style:italic;margin-top:10px;max-width:30ch}
.hero .ref{display:inline-block;margin-top:18px;font-weight:700;font-size:12.5px;letter-spacing:.08em;color:var(--gold);border:1px solid var(--gold-dim);padding:6px 12px;border-radius:999px}
.scripture{margin-top:16px;color:var(--ink);font-size:15px;border-left:2px solid var(--gold-dim);padding-left:16px;max-width:62ch}
.scripture em{display:block;color:var(--muted);font-style:normal;font-size:13.5px;margin-top:6px}

.vision{margin-top:18px;display:flex;gap:14px;align-items:flex-start;padding:20px 22px;border-radius:var(--radius);border:1px solid var(--line-solid);background:linear-gradient(120deg,#16344a,#102031)}
.vision .mark{flex:0 0 auto;width:34px;height:34px;color:var(--sky)}
.vision .v-to{font-family:'Playfair Display',serif;font-size:19px;color:#fff}
.vision .v-en{color:var(--sky);font-size:13.5px;margin-top:3px}

.goal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;margin-top:18px}
.goal{padding:18px 18px 6px;border-radius:14px}
.goal h3{font-size:17px;color:var(--cream);display:flex;align-items:baseline;gap:8px}
.goal h3 .en{font-size:12px;color:var(--gold);font-family:'Manrope';font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.goal ul{list-style:none;margin:12px 0 0;padding:0}
.goal li{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--muted)}
.goal li:first-child{border-top:0}
.goal li .lbl{flex:1}
.goal li .lbl .en{display:block;color:var(--muted-2);font-size:11.5px}
.goal li .tgt{flex:0 0 auto;font-weight:800;color:var(--gold-soft);font-variant-numeric:tabular-nums}

.quotes{margin-top:24px;display:grid;gap:14px}
.quote{padding:22px 24px;border-radius:14px;border:1px solid var(--line-solid);background:linear-gradient(160deg,#15273e,#0f1c2d)}
.quote p{font-family:'Playfair Display',serif;font-size:17px;color:var(--ink);margin:0;font-style:italic}
.quote .en{font-style:normal;font-family:'Manrope';font-size:13.5px;color:var(--muted);margin-top:8px}
.quote .by{display:block;margin-top:12px;font-size:12px;letter-spacing:.04em;color:var(--gold);font-weight:700;font-style:normal;font-family:'Manrope'}

/* image slot */
.imgslot{margin-top:14px;border:1.5px dashed var(--line-solid);border-radius:12px;background:#0c1726;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted-2);text-align:center;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.imgslot:hover{border-color:var(--gold-dim)}
.imgslot.small{min-height:84px}
.imgslot .ico{width:26px;height:26px;opacity:.6}
.imgslot .cap{font-size:11.5px;font-weight:600;letter-spacing:.03em}
.imgslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.imgslot .rm{position:absolute;top:6px;right:6px;z-index:2;background:rgba(8,14,22,.8);border:1px solid var(--line-solid);color:var(--cream);border-radius:8px;font-size:11px;padding:3px 8px;display:none}
.imgslot.has .rm{display:block}
.imgslot input[type=file]{display:none}

/* ---------- Tab 2: Lessons ---------- */
.notebar{display:flex;gap:12px;align-items:flex-start;padding:15px 18px;border-radius:13px;border:1px solid var(--line-solid);background:#11243a;margin-bottom:8px;font-size:13px;color:var(--muted)}
.notebar .badge{flex:0 0 auto;font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--gold);text-transform:uppercase}
.lessons{margin-top:18px;display:grid;gap:13px}
.lesson{display:grid;grid-template-columns:120px 1fr;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--line-solid);background:linear-gradient(120deg,#15263c,#101d2e)}
.lesson .photo{position:relative;background:#0c1726;border-right:1px solid var(--line-solid);min-height:100%;display:flex;align-items:center;justify-content:center}
.lesson .body{padding:16px 18px}
.lesson .date{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.05em;color:#1a1206;background:var(--gold);padding:4px 10px;border-radius:999px}
.lesson .date.q3{background:var(--sky);color:#06202c}
.lesson h3{font-size:18px;margin:11px 0 0;color:var(--cream)}
.lesson .topic-en{font-size:13px;color:var(--gold);font-weight:700;margin-top:2px}
.lesson .summary{font-size:13.5px;color:var(--ink);margin:10px 0 0;font-family:'Playfair Display',serif;font-style:italic}
.lesson .summary .en{display:block;font-family:'Manrope';font-style:normal;color:var(--muted);font-size:12.5px;margin-top:6px}
.lesson .who{margin-top:11px;font-size:12px;color:var(--muted-2)}
.lesson .who b{color:var(--ink);font-weight:700}

/* ---------- Tab 3: Tracker ---------- */
.editbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.btn{border:1px solid var(--line-solid);background:#13243a;color:var(--ink);font-weight:700;font-size:13px;padding:10px 15px;border-radius:11px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--gold-dim)}
.btn.primary{background:var(--gold);color:#1a1206;border-color:var(--gold)}
.btn.primary:hover{background:var(--gold-soft)}
.btn.ghost{background:transparent}
.btn svg{width:16px;height:16px}
.editstate{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted-2)}
.dot.on{background:var(--good);box-shadow:0 0 0 3px rgba(95,178,138,.18)}

.group{margin-top:20px}
.group > .ghead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:0 2px 12px}
.group .gtag{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--gold);text-transform:uppercase}
.group h3{font-size:19px;color:var(--cream)}
.group h3 .en{font-size:13px;color:var(--muted);font-family:'Manrope';font-weight:600}

.member{border:1px solid var(--line-solid);border-radius:13px;background:linear-gradient(160deg,#15263c,#101c2d);margin-bottom:11px;overflow:hidden}
.member .mhead{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.member .mname{flex:1;min-width:0}
.member .mname .nm{font-weight:700;font-size:15.5px;color:var(--cream)}
.member .mname .status{font-size:11.5px;color:var(--gold);font-weight:700;margin-top:1px}
.member .prog{flex:0 0 auto;display:flex;align-items:center;gap:9px}
.member .prog .ring{font-size:11.5px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
.bar{flex:0 0 64px;height:6px;border-radius:999px;background:#0c1726;overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-soft));width:0;transition:width .4s}
.chev{flex:0 0 auto;width:18px;height:18px;color:var(--muted-2);transition:transform .25s}
.member.open .chev{transform:rotate(90deg)}
.member .mbody{display:none;padding:4px 16px 18px;border-top:1px solid var(--line)}
.member.open .mbody{display:block}

.field{margin-top:14px}
.field > label{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:8px}
.indicators{display:grid;gap:7px}
.ind{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:10px;background:#0e1a2a;border:1px solid var(--line)}
.ind input{flex:0 0 auto;width:19px;height:19px;margin:1px 0 0;accent-color:var(--gold)}
.ind .key{flex:0 0 auto;font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);width:16px;text-align:center}
.ind .txt{flex:1;font-size:13px;color:var(--ink)}
.ind .txt .en{display:block;color:var(--muted-2);font-size:11.5px}
.ind.done{background:#10261c;border-color:#27543c}
.ind.done .txt{color:var(--good)}

.months{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.mon{display:flex;flex-direction:column;gap:5px}
.mon span{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--muted-2);text-transform:uppercase}
.mon textarea,.statusinput{width:100%;background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:12.5px;resize:vertical}
.mon textarea{min-height:46px}
.mon textarea:disabled,.statusinput:disabled{opacity:.78;cursor:default}
textarea:focus,input:focus{border-color:var(--gold-dim);background:#0b1521}

.legend{margin-top:18px;padding:16px 18px;border-radius:13px;border:1px solid var(--line-solid);background:#0f1d2e}
.legend h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.legend p{font-size:12.5px;color:var(--muted);margin:0 0 12px}
.codes{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.code{display:flex;align-items:center;gap:9px}
.code .c{flex:0 0 auto;font-weight:800;color:var(--gold-soft);font-size:13px;min-width:42px}
.code input{flex:1;background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:8px;padding:6px 9px;font-size:12.5px}

/* ---------- Tab 4: 21 Day ---------- */
.promise-intro{padding:24px 24px;border-radius:var(--radius);border:1px solid var(--line-solid);background:radial-gradient(600px 300px at 90% -40%,rgba(228,202,134,.13),transparent 60%),linear-gradient(160deg,#1a2f4b,#0f1c2d);box-shadow:var(--shadow)}
.promise-intro .formula{font-family:'Playfair Display',serif;font-size:clamp(16px,4.4vw,22px);color:var(--gold-soft);letter-spacing:.02em}
.promise-intro p{font-size:14px;color:var(--ink);margin:14px 0 0;max-width:64ch}
.promise-intro p .en{display:block;color:var(--muted);font-size:13px;margin-top:8px}
.promise-intro .vref{margin-top:14px;font-style:italic;font-family:'Playfair Display',serif;color:var(--gold);font-size:14.5px}

.promise-progress{display:flex;align-items:center;gap:14px;margin:18px 0;padding:16px 20px;border-radius:14px;border:1px solid var(--line-solid);background:#11243a}
.promise-progress .big{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold-soft);font-variant-numeric:tabular-nums}
.promise-progress .lbl{font-size:12.5px;color:var(--muted)}
.promise-progress .pbar{flex:1;height:9px;border-radius:999px;background:#0b1521;overflow:hidden;border:1px solid var(--line)}
.promise-progress .pbar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold-soft));transition:width .5s}

.blockhead{display:flex;align-items:baseline;gap:9px;margin:24px 0 10px}
.blockhead h3{font-size:18px;color:var(--cream)}
.blockhead .en{font-size:12.5px;color:var(--muted)}

.prayfor{display:grid;gap:8px}
.prayfor input{background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit}

.daygrid{display:grid;gap:8px}
.dayrow{display:grid;grid-template-columns:46px 1fr;gap:10px;align-items:stretch;border:1px solid var(--line-solid);border-radius:12px;background:linear-gradient(120deg,#15263c,#101c2d);overflow:hidden}
.dayrow.full{border-color:#2f5a3f;background:linear-gradient(120deg,#12281d,#0f1f18)}
.daynum{display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);background:#0d1a29;border-right:1px solid var(--line-solid)}
.dayrow.full .daynum{color:var(--good);background:#0c1f16}
.daymain{padding:11px 13px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px}
.scrip{flex:1 1 160px;min-width:0}
.scrip a{font-weight:700;font-size:14.5px;color:var(--ink)}
.scrip .sub{font-size:11px;color:var(--muted-2)}
.checks{display:flex;gap:14px;flex:0 0 auto}
.chk{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.chk input{width:20px;height:20px;accent-color:var(--gold)}
.chk.read input{accent-color:var(--good)}

.commitments{display:grid;gap:8px}
.commit{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:11px;border:1px solid var(--line-solid);background:#11243a}
.commit input{flex:0 0 auto;width:21px;height:21px;margin-top:1px;accent-color:var(--gold)}
.commit .txt{font-size:14px;color:var(--ink)}
.commit .txt .en{display:block;color:var(--muted);font-size:12.5px;margin-top:3px}

.contacts{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.contact{display:grid;grid-template-columns:1fr 130px;gap:8px}
.contact input{background:#0c1726;border:1px solid var(--line-solid);color:var(--ink);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit}
.contact .ph{font-variant-numeric:tabular-nums}

.toolbar-21{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 8px}
.savednote{font-size:12px;color:var(--muted-2);margin-top:10px}

footer{max-width:1080px;margin:0 auto;padding:30px 18px 50px;color:var(--muted-2);font-size:12px;border-top:1px solid var(--line-solid)}
footer b{color:var(--muted)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#0c1a16;border:1px solid #2f5a3f;color:var(--good);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:560px){
  .lesson{grid-template-columns:1fr}
  .lesson .photo{min-height:120px;border-right:0;border-bottom:1px solid var(--line-solid)}
  .contact{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Print (21-day worksheet) ---------- */
@media print{
  body{background:#fff;color:#111}
  header,nav.tabs,.langtoggle,.editbar,.toolbar-21,footer,.toast,.imgslot .rm{display:none!important}
  main{max-width:none;padding:0}
  .panel{display:none!important}
  .panel#panel-promise{display:block!important}
  .promise-intro,.promise-progress,.commit,.dayrow,.contact input,.prayfor input{background:#fff!important;border-color:#999!important;box-shadow:none!important}

        const on=state.tracker[m.id]&&state.tracker[m.id].ind&&state.tracker[m.id].ind[ind.k];
        return `<label class="ind${on?' done':''}">
          <input type="checkbox" data-mid="${m.id}" data-ind="${ind.k}" ${on?'checked':''} ${editMode?'':'disabled'}>

        const val=(state.tracker[m.id]&&state.tracker[m.id][mo[0]]!==undefined)?state.tracker[m.id][mo[0]]:(m[mo[0]]||'');
        return `<div class="mon"><span>${t(mo[1],mo[2])}</span><textarea data-mid="${m.id}" data-mon="${mo[0]}" ${editMode?'':'disabled'} placeholder="—">${esc(val)}</textarea></div>`;

    return `<div class="code"><span class="c">${c[0]}</span><input data-code="${c[0]}" value="${esc(v)}" ${editMode?'':'disabled'} placeholder="${t('fakaʻuhinga…','define…')}"></div>`;

function renderPromise(){

  const intro_en="Elder M. Russell Ballard and Elder Robert E. Wells issued a special promise to all members. Make a list of your not-yet-member or less-active friends and pray for them by name in your morning and evening prayers. If you do this for 21 consecutive days without missing one, the Lord promises that at least one person will accept an invitation to hear the missionary lessons by the end of the 21 days.";
  const vref_to='“Ko au, ko e ʻEikí, ʻoku ou haʻisia ʻoka mou ka fai ʻa e meʻa kuó u lea ʻakí.” — Tokāteline mo e Ngaahi Fuakava 82:10';
  const vref_en='“I, the Lord, am bound when ye do what I say.” — Doctrine & Covenants 82:10';

      <div class="daynum">${n}</div>

          <label class="chk"><input type="checkbox" data-day21="${n}" data-f="am" ${d.am?'checked':''}>${t('Pongipongi','AM')}</label>

          <label class="chk read"><input type="checkbox" data-day21="${n}" data-f="read" ${d.read?'checked':''}>${t('Lau','Read')}</label>
        </div>
      </div></div>`;
  }).join('');

  const total=SCRIPTURES.length;
  let complete=0;for(let i=1;i<=total;i++){const d=state.p21['d'+i]||{};if(d.am&&d.pm&&d.read)complete++;}
  const pct=Math.round(complete/total*100);

  $('#panel-promise').innerHTML=`
    <div class="section-head"><div class="eyebrow">${t('Ngāue Fakafaifekau','Member Missionary Work')}</div><h2>${t('Palōmesi ʻAho ʻe 21','The 21-Day Promise')}</h2></div>

      <div class="vref">${esc(t(vref_to,vref_en))}</div>
    </div>

    <div class="promise-progress">
      <div class="big" id="p21-count">${complete}<span style="font-size:16px;color:var(--muted)">/${total}</span></div>
      <div style="flex:1"><div class="lbl">${t('ʻAho kuo kakato (Pongipongi · Efiafi · Lau)','Days completed (AM · PM · Read)')}</div>
        <div class="pbar"><i id="p21-bar" style="width:${pct}%"></i></div></div>

    <div class="daygrid">${days}</div>

    <div class="blockhead"><h3>${t('Ngaahi Tukupaa','Commitments')}</h3></div>
    <div class="commitments">${commits}</div>

    <div class="blockhead"><h3>${t('Hoʻo Ongo Faifekau Taimi Kakató','Your Full-Time Missionaries')}</h3></div>

      <button class="btn" onclick="share21()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>${t('Vahevahe ʻa e link','Share link')}</button>

    </div>

  bindPromise();
}

let state={tracker:{},codes:{},p21:{}};
let editMode=false;

function bindTracker(){
  $$('#panel-tracker .ind input').forEach(c=>c.addEventListener('change',e=>{
    if(!editMode){e.target.checked=!e.target.checked;return;}
    const id=e.target.dataset.mid,k=e.target.dataset.ind;
    state.tracker[id]=state.tracker[id]||{};state.tracker[id].ind=state.tracker[id].ind||{};
    state.tracker[id].ind[k]=e.target.checked;saveTracker();renderTracker();
  }));
  $$('#panel-tracker textarea[data-mon]').forEach(ta=>ta.addEventListener('input',e=>{
    const id=e.target.dataset.mid,mo=e.target.dataset.mon;
    state.tracker[id]=state.tracker[id]||{};state.tracker[id][mo]=e.target.value;saveTrackerDebounced();
  }));
  $$('#panel-tracker .statusinput').forEach(inp=>inp.addEventListener('input',e=>{
    const id=e.target.dataset.mid;state.tracker[id]=state.tracker[id]||{};state.tracker[id].status=e.target.value;saveTrackerDebounced();
  }));
  $$('#panel-tracker .code input').forEach(inp=>inp.addEventListener('input',e=>{
    state.codes[e.target.dataset.code]=e.target.value;saveTrackerDebounced();
  }));
}
let _sv;
function saveTrackerDebounced(){clearTimeout(_sv);_sv=setTimeout(saveTracker,500);}
function saveTracker(){Store.set('tracker',state.tracker);Store.set('codes',state.codes);}

function toggleEdit(){
  if(!editMode){
    const code=prompt(t('Fakahū ʻa e fika faka-takimuʻá:','Enter leader passcode:'));
    if(code===null)return;
    if(code!==LEADER_PASSCODE){toast(t('Fika hala','Wrong passcode'));return;}
    editMode=true;toast(t('Ava ki he fakatonutonú','Editing unlocked'));
  }else{editMode=false;toast(t('Kuo tāpuni','Editing locked'));}
  renderTracker();
}

function bindPromise(){
  $$('#panel-promise input[data-day21]').forEach(c=>c.addEventListener('change',e=>{
    const n=e.target.dataset.day21,f=e.target.dataset.f;
    state.p21['d'+n]=state.p21['d'+n]||{};state.p21['d'+n][f]=e.target.checked;
    saveP21();updateP21Progress(n);
  }));
  $$('#panel-promise input[data-p21]').forEach(inp=>inp.addEventListener('input',e=>{state.p21[e.target.dataset.p21]=e.target.value;saveP21Debounced();}));
  $$('#panel-promise input[data-p21c]').forEach(c=>c.addEventListener('change',e=>{state.p21['c'+e.target.dataset.p21c]=e.target.checked;saveP21();}));
}
function updateP21Progress(n){
  // update the single row's full-state + the top counter without full re-render (keeps focus/scroll)
  const total=SCRIPTURES.length;let complete=0;
  for(let i=1;i<=total;i++){const d=state.p21['d'+i]||{};if(d.am&&d.pm&&d.read)complete++;}
  const row=$(`#panel-promise .dayrow[data-day="${n}"]`);
  if(row){const d=state.p21['d'+n]||{};row.classList.toggle('full',!!(d.am&&d.pm&&d.read));}
  const cnt=$('#p21-count');if(cnt)cnt.innerHTML=`${complete}<span style="font-size:16px;color:var(--muted)">/${total}</span>`;
  const bar=$('#p21-bar');if(bar)bar.style.width=Math.round(complete/total*100)+'%';
  if(complete===total)toast(t('Mālō! Kuo kakato ʻa e ʻaho ʻe 21 🌅','You did it! 21 days complete 🌅'));
}
let _svp;
function saveP21Debounced(){clearTimeout(_svp);_svp=setTimeout(saveP21,500);}
function saveP21(){Store.set('p21',state.p21);}
function reset21(){if(confirm(t('Kamata foʻou ʻa e palōmesí? ʻE mole ʻa e fakaʻiló.','Start the promise over? Your progress will be cleared.'))){state.p21={};saveP21();renderPromise();}}
function share21(){
  const url=location.href.split('#')[0];
  if(navigator.share){navigator.share({title:'WJ8 · 21-Day Promise',url}).catch(()=>{});}
  else{navigator.clipboard.writeText(url).then(()=>toast(t('Kuo kopi ʻa e linkí','Link copied'))).catch(()=>toast(url));}
}

/* ---- image slots (theme/lessons) saved as data URLs ---- */
function imgslot(id,capTo,capEn,small){
  const saved=state.img&&state.img[id];
  return `<label class="imgslot${small?' small':''}${saved?' has':''}" data-img="${id}">
    ${saved?`<img src="${saved}" alt="">`:`<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>${capTo||capEn?`<span class="cap">${esc(t(capTo,capEn))}</span>`:`<span class="cap">${t('Fakahūʻi fakatātā','Add photo')}</span>`}`}
    <span class="rm" onclick="removeImg(event,'${id}')">${t('Toʻo','Remove')}</span>
    <input type="file" accept="image/*"></label>`;
}
function bindImgSlots(){
  $$('.imgslot input[type=file]').forEach(inp=>inp.addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const id=e.target.closest('.imgslot').dataset.img;
    const r=new FileReader();r.onload=()=>{state.img=state.img||{};state.img[id]=r.result;Store.set('img',state.img);
      const tab=$('.tab[aria-selected="true"]').dataset.tab;tab==='theme'?renderTheme():renderLessons();};
    r.readAsDataURL(f);
  }));
}
function removeImg(ev,id){ev.preventDefault();ev.stopPropagation();if(state.img)delete state.img[id];Store.set('img',state.img||{});
  const tab=$('.tab[aria-selected="true"]').dataset.tab;tab==='theme'?renderTheme():renderLessons();}

/* =====================================================================
   LANGUAGE + TABS + BOOT
   ===================================================================== */
function setLang(l){
  LANG=l;localStorage.setItem('wj8_lang',l);
  document.documentElement.lang=l==='to'?'to':'en';
  document.body.className='lang-'+l;
  $('#lang-to').setAttribute('aria-pressed',l==='to');
  $('#lang-en').setAttribute('aria-pressed',l==='en');
  $$('[data-to]').forEach(el=>{el.textContent=l==='to'?el.dataset.to:el.dataset.en;});
  renderAll();
}
function renderAll(){renderTheme();renderLessons();renderTracker();renderPromise();}

$$('.tab').forEach(tab=>tab.addEventListener('click',()=>{
  $$('.tab').forEach(t=>t.setAttribute('aria-selected','false'));
  tab.setAttribute('aria-selected','true');
  $$('.panel').forEach(p=>p.classList.remove('active'));
  $('#panel-'+tab.dataset.tab).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}));

(async function boot(){
  const mode=await Store.init();
  state.tracker=await Store.get('tracker')||{};
  state.codes=await Store.get('codes')||{};
  state.p21=await Store.get('p21')||{};
  state.img=await Store.get('img')||{};
  $('#storage-note').textContent = (Store.mode==='cloud')
    ? (LANG==='to'?'Fakahokohoko ʻi he ʻao (Firebase).':'Synced to the cloud (Firebase).')
    : (LANG==='to'?'ʻOku tauhi ʻa e tracker ʻi he tēvaisí ni. Fakaava ʻa e Firebase ke vahevahe ki he kau takimuʻá.':'Tracker saves on this device. Enable Firebase to share across the presidency.');
  setLang(LANG);
})();
</script>
</body>
</html>
